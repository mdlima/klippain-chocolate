
#---------------------------------------------#
#### Mellow Fly MMU MCU definition ###########
#---------------------------------------------#

[mcu mmu]
##--------------------------------------------------------------------
# serial: /dev/serial/by-id/change-me-to-the-correct-mcu-path
canbus_uuid: change-me-to-the-correct-canbus-id
##--------------------------------------------------------------------

# If you want to override the wiring of the Mellow Fly MMU board, keep in mind that this
# board is defined using the "mmu" name. So you should use "pin: mmu:PIN_NAME"
# in your own overrides.cfg files.

[include config/mcu_definitions/mmu/Mellow_fly_MMU.cfg] # Do not remove this line
[board_pins mmu_mcu]
mcu: mmu
aliases:
    MMU_GEAR_STEP=MCU_M1_STEP  , MMU_GEAR_DIR=MCU_M1_DIR  , MMU_GEAR_ENABLE=MCU_M1_EN  , MMU_GEAR_UART=MCU_M1_UART  ,
    MMU_GEAR_DIAG=MCU_M1_DIAG  ,
    MMU_SEL_STEP=MCU_M2_STEP   , MMU_SEL_DIR=MCU_M2_DIR   , MMU_SEL_ENABLE=MCU_M2_EN   , MMU_SEL_UART=MCU_M2_UART   ,
    MMU_SEL_DIAG=MCU_M2_DIAG   ,

    MMU_SEL_ENDSTOP=MCU_ENDSTOP  ,
    MMU_SEL_SERVO=MCU_SERVO      ,
    MMU_ENCODER=MCU_ENCODER      ,
    MMU_GATE_SENSOR=MCU_EXTRA1   ,
    MMU_NEOPIXEL=MCU_RGB         ,

    MMU_PRE_GATE_0=MCU_PC3  , MMU_PRE_GATE_1=MCU_PC2  , MMU_PRE_GATE_2=MCU_PC1  , MMU_PRE_GATE_3=MCU_PC0  ,
    MMU_PRE_GATE_4=MCU_PD7  , MMU_PRE_GATE_5=MCU_PD6  , MMU_PRE_GATE_6=MCU_PD5  , MMU_PRE_GATE_7=MCU_PD4  , MMU_PRE_GATE_8=MCU_PD3  ,

