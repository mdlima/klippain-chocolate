
#--------------------------------------------#
#### TuZiBan TZB V1 MCU definition ###########
#--------------------------------------------#

[mcu mmu]
##--------------------------------------------------------------------
# serial: /dev/serial/by-id/change-me-to-the-correct-mcu-path
canbus_uuid: change-me-to-the-correct-canbus-id
##--------------------------------------------------------------------

# If you want to override the wiring of the TuZiBan TZB V1 board, keep in mind that this
# board is defined using the "mmu" name. So you should use "pin: mmu:PIN_NAME"
# in your own overrides.cfg files.

[include config/mcu_definitions/mmu/TuZiBan_TZB_v1.0.cfg] # Do not remove this line
[board_pins mmu_mcu]
mcu: mmu
aliases:
    MMU_GEAR_STEP=MCU_GEAR_STEP    , MMU_GEAR_DIR=MCU_GEAR_DIR    , MMU_GEAR_ENABLE=MCU_GEAR_EN    , MMU_GEAR_UART=MCU_GEAR_UART    ,
    MMU_GEAR_DIAG=MCU_GEAR_DIAG    ,
    MMU_SEL_STEP=MCU_SELECTOR_STEP , MMU_SEL_DIR=MCU_SELECTOR_DIR , MMU_SEL_ENABLE=MCU_SELECTOR_EN , MMU_SEL_UART=MCU_SELECTOR_UART ,
    MMU_SEL_DIAG=MCU_SELECTOR_DIAG ,

    MMU_SEL_ENDSTOP=MCU_ENDSTOP3    ,
    MMU_SEL_SERVO=MCU_MOTO1         ,
    MMU_ENCODER=MCU_BINKY           ,
    MMU_GATE_SENSOR=MCU_PRE_GATE_12 ,
    MMU_NEOPIXEL=MCU_RGB            ,

    MMU_FEEDBACK_ANALOG=MCU_HALL_ADC      ,
    MMU_FEEDBACK_TENSION=MCU_ENDSTOP1     ,
    MMU_FEEDBACK_COMPRESSION=MCU_ENDSTOP2 ,

    MMU_PRE_GATE_5=MCU_PRE_GATE_5 , MMU_PRE_GATE_4=MCU_PRE_GATE_4  , MMU_PRE_GATE_3=MCU_PRE_GATE_3 , MMU_PRE_GATE_2=MCU_PRE_GATE_2 , MMU_PRE_GATE_1=MCU_PRE_GATE_1   , MMU_PRE_GATE_0=MCU_PRE_GATE_0   ,
    MMU_PRE_GATE_6=MCU_PRE_GATE_6 , MMU_PRE_GATE_7=MMCU_PRE_GATE_7 , MMU_PRE_GATE_8=MCU_PRE_GATE_8 , MMU_PRE_GATE_9=MCU_PRE_GATE_9 , MMU_PRE_GATE_10=MCU_PRE_GATE_10 , MMU_PRE_GATE_11=MCU_PRE_GATE_11 ,

