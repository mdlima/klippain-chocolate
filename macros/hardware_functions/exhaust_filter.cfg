[gcode_macro START_EXHAUST]
gcode:
    {% set SPEED = params.SPEED|default(1)|float %}

    {% set filter_name = printer["gcode_macro _USER_VARIABLES"].exhaust_filter_name %}
    SET_FAN_SPEED FAN={filter_name} SPEED={SPEED}


[gcode_macro STOP_EXHAUST]
gcode:
    {% set filter_name = printer["gcode_macro _USER_VARIABLES"].exhaust_filter_name %}
    SET_FAN_SPEED FAN={filter_name} SPEED=0


[delayed_gcode _START_EXHAUST_DELAYED]
gcode:
    START_EXHAUST

[delayed_gcode _STOP_EXHAUST_DELAYED]
gcode:
    STOP_EXHAUST
